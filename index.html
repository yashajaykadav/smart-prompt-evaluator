<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Smart Prompt Evaluator</title>

    <style>
        body {
            font-family: sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
            background: #f4f4f9;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h1 {
            margin-bottom: 10px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
        }

        button {
            background: #6200ee;
            color: white;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        button:disabled {
            background: #ccc;
        }

        .usage-stats {
            margin-top: 10px;
            font-size: 13px;
            color: #555;
        }

        .result-box {
            margin-top: 25px;
            display: none;
        }

        .score-badge {
            font-size: 26px;
            font-weight: bold;
            color: #6200ee;
        }

        /* METRICS */
        .metric-container {
            margin-bottom: 15px;
        }

        .progress-bg {
            background: #eee;
            height: 8px;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 5px;
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.8s ease;
        }

        .metric-reason {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        /* PREVIEW */
        .comparison-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .preview-box {
            background: #f9f9f9;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ddd;
            font-size: 0.9em;
        }

        /* IMPROVED */
        .improved-zone {
            background: #e8f5e9;
            padding: 12px;
            border-left: 4px solid #4caf50;
            margin-top: 20px;
            border-radius: 6px;
        }

        /* LOADING */
        .loading {
            text-align: center;
            font-size: 14px;
            color: #777;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<div class="card">

    <h1>🎯 Prompt Evaluator</h1>
    <p>Analyze and improve your prompts using AI.</p>

    <textarea id="promptInput" placeholder="e.g., Act as a senior developer and explain REST APIs in 200 words..."></textarea>
    
    <button onclick="evaluatePrompt()" id="submitBtn">Evaluate</button>

    <div class="usage-stats">
        ⚡ Tokens: <span id="tokenDisplay">0</span> | 
        Cost: <span id="costDisplay">₹0.00</span>
    </div>

    <div class="loading" id="loadingText" style="display:none;">
        ⏳ Evaluating your prompt...
    </div>

    <div id="resultBox" class="result-box">

        <h2>📊 Analysis</h2>

        <!-- METRICS -->
        <div id="metrics"></div>

        <hr>

        <!-- OVERALL -->
        <div>
            Overall Score: <span class="score-badge" id="scoreDisplay"></span>/10
        </div>

        <p><strong>Feedback:</strong> <span id="feedbackDisplay"></span></p>

        <!-- PREVIEW -->
        <div class="comparison-grid">
            <div class="preview-box">
                <strong>Old Output</strong>
                <p id="oldPreview"></p>
            </div>

            <div class="preview-box">
                <strong>Improved Output</strong>
                <p id="newPreview"></p>
            </div>
        </div>

        <!-- IMPROVED PROMPT -->
        <div class="improved-zone">
            <strong>Suggested Prompt:</strong>
            <p id="improvedDisplay"></p>
            <button onclick="copyToClipboard()">📋 Copy</button>
        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
